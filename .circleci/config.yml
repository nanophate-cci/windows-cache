version: 2.1
jobs:
  build:
    parameters:
      version:
        type: string
    machine:
      image: windows-server-2019-vs2019:<< parameters.version >>
      resource_class: windows.medium
      shell: bash
    parallelism: 5
    steps:
      - checkout
      - run: docker version
      - restore_cache:
          name: restore file
          keys:
            - hello-{{ .Environment.CIRCLE_WORKING_DIRECTORY }}
      - save_cache:
          name: save cache
          key: hello-{{ .Environment.CIRCLE_WORKING_DIRECTORY }}
          paths:
            - ~/cache/hello.txt

workflows:
  win-jobs:
    jobs:
      - build:
          matrix:
            parameters:
              version: ["2024.07.1", "current"]
 
